name: Sync to Org Project
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Destination dev branch
        env:
          DEST_REPO: "Medlink-Ehealth/medlink-backend"
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # Force push source main to destination dev branch
          git push "https://${TOKEN}@github.com/${DEST_REPO}.git" main:dev --force
          
          echo "✅ Successfully synced to dev branch"