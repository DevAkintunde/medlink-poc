name: Sync to Org Project as PR
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false  # Critical: prevents GITHUB_TOKEN from being used

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push and Create PR via API
        env:
          DEST_REPO: "Medlink-Ehealth/medlink-backend"
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          BRANCH_NAME="sync/source-${GITHUB_SHA::8}"
          
          # Add remote using PAT
          git remote add destination "https://${TOKEN}@github.com/${DEST_REPO}.git"
          
          # Push to new branch
          git push destination main:${BRANCH_NAME}
          
          # Create PR using REST API with verbose output
          RESPONSE=$(curl -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -w "\nHTTP Status: %{http_code}\n" \
            "https://api.github.com/repos/${DEST_REPO}/pulls" \
            -d "{
              \"title\": \"Sync from source repo: ${GITHUB_SHA::8}\",
              \"body\": \"Automated sync from source repository.\\n\\nCommit: ${GITHUB_SHA}\",
              \"head\": \"${BRANCH_NAME}\",
              \"base\": \"main\"
            }")
          
          echo "$RESPONSE"
          
          # Check if PR was created
          if echo "$RESPONSE" | grep -q '"html_url"'; then
            PR_URL=$(echo "$RESPONSE" | grep -o '"html_url": "[^"]*' | cut -d'"' -f4)
            echo "✅ PR created: ${PR_URL}"
          else
            echo "❌ PR creation failed"
            echo "Response: $RESPONSE"
            exit 1
          fi