name: Sync to Org Project as PR
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync via Pull Request
        env:
          DEST_REPO: "Medlink-Ehealth/medlink-backend"
          TOKEN: ${{ secrets.SYNC_TOKEN }}
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Push to temporary branch (not main)
          BRANCH_NAME="sync/auto-sync-${GITHUB_SHA::8}"
          REMOTE_URL="https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git"
          git remote add destination "$REMOTE_URL"
          
          # Push to the temporary branch (this should work since it's not protected)
          git push destination main:${BRANCH_NAME} --force
          
          # Create PR from that branch
          gh pr create --repo "${DEST_REPO}" --head "${BRANCH_NAME}" --base "main"