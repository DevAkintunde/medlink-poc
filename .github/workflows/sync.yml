name: Sync to Org Project as PR
on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false  # Critical: prevents GITHUB_TOKEN from being used

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push and Create PR
        env:
          DEST_REPO: "Medlink-Ehealth/medlink-backend"
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          BRANCH_NAME="sync/source-${GITHUB_SHA::8}"
          
          # Add remote using PAT (no x-access-token)
          git remote add destination "https://${GH_TOKEN}@github.com/${DEST_REPO}.git"
          
          # Push to new branch
          git push destination main:${BRANCH_NAME}
          
          # Create PR using GitHub CLI
          gh pr create \
            --repo "${DEST_REPO}" \
            --head "${BRANCH_NAME}" \
            --base "main" \
            --title "Sync from source repo: ${GITHUB_SHA::8}" \
            --body "Automated sync from source repository.
            
            Commit: ${GITHUB_SHA}
            Branch: ${GITHUB_REF_NAME}"