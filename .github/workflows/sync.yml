name: Sync to Org Project
on:
  push:
    branches:
      - main
env:
  # Opt into Node.js 24 now to clear the warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Organization Repo
        env:
          # Replace ORG/REPO with the actual organization and repository name
          DEST_REPO: "Medlink-Ehealth/medlink-backend"
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          REMOTE_URL="https://x-access-token:${TOKEN}@://github.com{DEST_REPO}.git"
          git remote add destination "$REMOTE_URL"
          git push destination main --force
